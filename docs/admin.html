<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Prototype Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="header">
    <h1>JiranData Prototype Portal</h1>
    <nav>
      <a href="index.html">Portal</a>
      <a href="admin.html" class="active">Admin</a>
      <a href="#" id="logout-btn" style="display:none;" onclick="logout()">Logout</a>
    </nav>
  </div>

  <!-- Login Overlay -->
  <div id="login-overlay" class="login-overlay">
    <div class="login-box">
      <h2>Admin Login</h2>
      <form id="login-form">
        <div class="form-group">
          <label>ID</label>
          <input type="text" id="login-id" required placeholder="아이디를 입력하세요" autocomplete="username">
        </div>
        <div class="form-group" style="margin-top:12px;">
          <label>Password</label>
          <input type="password" id="login-pw" required placeholder="비밀번호를 입력하세요" autocomplete="current-password">
        </div>
        <p id="login-error" style="color:#ff3b30;font-size:13px;margin-top:8px;display:none;">아이디 또는 비밀번호가 올바르지 않습니다.</p>
        <button type="submit" class="btn btn-primary" style="width:100%;height:42px;margin-top:16px;justify-content:center;">로그인</button>
      </form>
    </div>
  </div>

  <div class="container" id="admin-content" style="display:none;">
    <!-- Admin Tabs -->
    <div class="admin-tabs">
      <button class="admin-tab-btn active" data-tab="projects" onclick="switchAdminTab('projects')">프로젝트 관리</button>
      <button class="admin-tab-btn" data-tab="prototypes" onclick="switchAdminTab('prototypes')">프로토타입 등록</button>
      <button class="admin-tab-btn" data-tab="tags" onclick="switchAdminTab('tags')">제품 태그 관리</button>
    </div>

    <!-- Projects Tab -->
    <div id="admin-tab-projects" class="admin-tab-content active">
      <div class="admin-section">
        <h2>프로젝트 추가</h2>
        <form id="project-form">
          <div class="form-row">
            <div class="form-group">
              <label>프로젝트 이름</label>
              <input type="text" id="project-name" required placeholder="프로젝트 이름을 입력하세요">
            </div>
            <div class="form-group">
              <label>설명 (선택)</label>
              <input type="text" id="project-desc" placeholder="간단한 설명">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>제품 태그</label>
              <div id="project-tags-select" class="tag-select-area">
                <p style="color:#9ca3af;font-size:13px;">태그가 없습니다. 제품 태그 관리에서 먼저 추가해주세요.</p>
              </div>
            </div>
            <button type="submit" class="btn btn-primary" style="height:40px;align-self:flex-end;">추가</button>
          </div>
        </form>
      </div>

      <div class="admin-section">
        <h2>프로젝트 목록</h2>
        <ul id="project-list" class="admin-list"></ul>
      </div>
    </div>

    <!-- Prototypes Tab -->
    <div id="admin-tab-prototypes" class="admin-tab-content">
      <div class="admin-section">
        <h2>프로토타입 등록</h2>
        <form id="prototype-form">
          <div class="form-row">
            <div class="form-group">
              <label>프로젝트</label>
              <select id="proto-project" required>
                <option value="">프로젝트 선택</option>
              </select>
            </div>
            <div class="form-group">
              <label>프로토타입 이름</label>
              <input type="text" id="proto-name" required placeholder="프로토타입 이름">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>HTML 파일</label>
              <input type="file" id="proto-file" accept=".html,.htm" required>
            </div>
            <div class="form-group">
              <label>Figma 링크 (선택)</label>
              <input type="url" id="proto-figma" placeholder="https://figma.com/...">
            </div>
            <button type="submit" class="btn btn-primary" style="height:40px;">등록</button>
          </div>
        </form>
      </div>

      <div class="admin-section">
        <h2>프로토타입 목록</h2>
        <ul id="prototype-list" class="admin-list"></ul>
      </div>
    </div>

    <!-- Tags Tab -->
    <div id="admin-tab-tags" class="admin-tab-content">
      <div class="admin-section">
        <h2>제품 태그 추가</h2>
        <form id="tag-form">
          <div class="form-row">
            <div class="form-group">
              <label>태그 이름</label>
              <input type="text" id="tag-name" required placeholder="예: DataHub, CloudSync, AI Suite">
            </div>
            <div class="form-group">
              <label>태그 색상</label>
              <div class="color-options" id="color-options">
                <span class="color-dot selected" data-color="#2563eb" style="background:#2563eb;"></span>
                <span class="color-dot" data-color="#059669" style="background:#059669;"></span>
                <span class="color-dot" data-color="#d97706" style="background:#d97706;"></span>
                <span class="color-dot" data-color="#dc2626" style="background:#dc2626;"></span>
                <span class="color-dot" data-color="#7c3aed" style="background:#7c3aed;"></span>
                <span class="color-dot" data-color="#db2777" style="background:#db2777;"></span>
                <span class="color-dot" data-color="#0891b2" style="background:#0891b2;"></span>
                <span class="color-dot" data-color="#4b5563" style="background:#4b5563;"></span>
              </div>
            </div>
            <button type="submit" class="btn btn-primary" style="height:40px;">추가</button>
          </div>
        </form>
      </div>

      <div class="admin-section">
        <h2>태그 목록</h2>
        <ul id="tag-list" class="admin-list"></ul>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
